<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карточка изделия</title>

<style>
body { font-family: Arial; margin: 0; background: #f3f3f3; }
.wrap { max-width: 700px; margin: auto; background: white; padding: 15px; }

img { width: 100%; border-radius: 8px; margin-bottom: 15px; }

h1 { font-size: 22px; }

.block { margin-top: 15px; }
</style>
</head>

<body>

<div class="wrap">

<h1 id="title">Загрузка...</h1>

<img id="photo">

<div class="block">
<b>Описание:</b><br>
<span id="desc"></span>
</div>

<div class="block">
<b>Характеристики:</b><br>
<span id="specs"></span>
</div>

<div class="block">
<b>Партия:</b><br>
<span id="batch"></span>
</div>

<div class="block">
<b>Файлы:</b><br>
<div id="files"></div>
</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const item = params.get("item");

fetch(`items/${item}/data.json`)
.then(res => res.json())
.then(data => {

document.getElementById("title").innerText = data.title;
document.getElementById("photo").src = `items/${item}/${data.image}`;
document.getElementById("desc").innerText = data.description;

document.getElementById("specs").innerHTML = data.specs.join("<br>");
document.getElementById("batch").innerHTML = data.batch.join("<br>");

let filesHTML = "";
if (data.files) {
  data.files.forEach(f => {
    filesHTML += `<a href="items/${item}/${f.path}" target="_blank">${f.name}</a><br>`;
  });
}
document.getElementById("files").innerHTML = filesHTML;

});
</script>

</body>
</html>
