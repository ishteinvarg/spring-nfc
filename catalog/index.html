<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Passport</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 15px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 26px;
      margin-bottom: 15px;
    }
    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
      display: none;
    }
    .block {
      margin-top: 15px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 10px;
    }
    .block b {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }
    ul {
      margin: 0;
      padding-left: 18px;
    }
    .link-list {
      margin: 0;
      padding-left: 18px;
    }
    .link-list li {
      margin: 0 0 6px 0;
    }
    a {
      color: #0f62fe;
      text-decoration: none;
      word-break: break-word;
    }
    a:hover {
      text-decoration: underline;
    }
    .error {
      color: red;
      font-weight: bold;
      white-space: pre-line;
    }
    .passport-block {
      padding: 10px 12px;
      background: #f6f7f9;
      margin-top: 18px;
    }
    .passport-block b {
      font-size: 13px;
      margin-bottom: 6px;
      color: #111827;
      letter-spacing: 0.1px;
    }
    .passport-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 18px;
    }
    .passport-row {
      line-height: 1.2;
    }
    .passport-label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: #4b5563;
      margin-bottom: 2px;
    }
    .passport-value {
      display: block;
      font-size: 12px;
      color: #374151;
      word-break: break-word;
    }
    @media (max-width: 640px) {
      .passport-grid {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1 id="title">Loading...</h1>
    <img id="photo" alt="Image">
    <div id="content"></div>
    <div id="error" class="error"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const item = params.get("item");

const REPO_BASE = "/spring-nfc";
const CATALOG_BASE = REPO_BASE + "/catalog";
const ITEMS_BASE = CATALOG_BASE + "/items2";

let currentData = null;

function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function getText(value) {
  if (typeof value === "string") return value;
  if (value && typeof value === "object") {
    return value.ru || value.en || value.he || "";
  }
  return "";
}

function getArray(value) {
  if (Array.isArray(value)) return value;
  if (value && typeof value === "object") {
    return value.ru || value.en || value.he || [];
  }
  return [];
}

function normalizeHref(value) {
  const raw = String(value || "").trim();
  if (!raw) return "";
  if (raw.startsWith("http://") || raw.startsWith("https://") || raw.startsWith("mailto:") || raw.startsWith("tel:")) {
    return raw;
  }
  return "https://" + raw;
}

function renderTextBlock(title, content) {
  if (!content.length) return "";
  return `<div class="block"><b>${esc(title)}</b>${content.map(x => esc(x)).join("<br>")}</div>`;
}

function renderListBlock(title, content) {
  if (!content.length) return "";
  let html = `<div class="block"><b>${esc(title)}</b><ul>`;
  content.forEach(i => {
    html += `<li>${esc(i)}</li>`;
  });
  html += `</ul></div>`;
  return html;
}

function renderLinksBlock(title, content) {
  if (!content.length) return "";
  let html = `<div class="block"><b>${esc(title)}</b><ul class="link-list">`;
  content.forEach(i => {
    const label = esc(i.label || "");
    const text = esc(i.text || "");
    const href = normalizeHref(i.href || "");
    const line = label ? `${label}: ${text}` : text;
    if (href) {
      html += `<li><a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${line}</a></li>`;
    } else {
      html += `<li>${line}</li>`;
    }
  });
  html += `</ul></div>`;
  return html;
}

function renderFilesBlock(title, content) {
  if (!content.length) return "";
  let html = `<div class="block"><b>${esc(title)}</b><ul class="link-list">`;
  content.forEach(file => {
    const name = esc(file.name || file.path || "File");
    const path = file.path ? `${ITEMS_BASE}/${encodeURIComponent(item)}/${encodeURIComponent(file.path)}` : "";
    if (path) {
      html += `<li><a href="${path}" target="_blank" rel="noopener noreferrer">${name}</a></li>`;
    } else {
      html += `<li>${name}</li>`;
    }
  });
  html += `</ul></div>`;
  return html;
}

function hasValue(v) {
  return !(v === undefined || v === null || String(v).trim() === "");
}

function passportEntries(data) {
  return [
    ["Status", data.status],
    ["Version", data.version],
    ["Product Name", data.product_name || data.title],
    ["Batch ID", data.batch_id],
    ["Serial ID", data.serial_id],
    ["Verification Code", data.verification_code],
    ["Created At", data.created_at],
    ["Updated At", data.updated_at]
  ].filter(([_, value]) => hasValue(value));
}

function renderPassportBlock(data) {
  const entries = passportEntries(data);
  if (!entries.length) return "";
  let html = `<div class="block passport-block"><b>Product Passport</b><div class="passport-grid">`;
  entries.forEach(([label, value]) => {
    html += `<div class="passport-row"><span class="passport-label">${esc(label)}</span><span class="passport-value">${esc(value)}</span></div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderCard() {
  if (!currentData) return;

  document.getElementById("title").innerText = getText(currentData.product_name) || getText(currentData.title) || "Product Passport";

  const img = document.getElementById("photo");
  if (currentData.image) {
    img.src = `${ITEMS_BASE}/${encodeURIComponent(item)}/${encodeURIComponent(currentData.image)}?v=${Date.now()}`;
    img.style.display = "block";
  } else {
    img.removeAttribute("src");
    img.style.display = "none";
  }

  let html = "";

  (currentData.sections || []).forEach(section => {
    if (section.hide === true) return;

    let title = getText(section.title);
    const type = section.type;
    const content = getArray(section.content);

    if (type === "text") {
      title = "Description";
      html += renderTextBlock(title, content);
    } else if (type === "list") {
      html += renderListBlock(title || "List", content);
    } else if (type === "links") {
      title = "Contacts";
      const normalizedContent = content.map(i => ({
        ...i,
        label:
          i.kind === "phone" ? "Phone" :
          i.kind === "email" ? "Email" :
          i.kind === "whatsapp" ? "WhatsApp" :
          i.kind === "website" ? "Website" :
          (i.label === "Телефон" ? "Phone" :
           i.label === "Сайт" ? "Website" :
           i.label || "")
      }));
      html += renderLinksBlock(title, normalizedContent);
    } else if (type === "files") {
      title = "Files";
      html += renderFilesBlock(title, content);
    }
  });

  html += renderPassportBlock(currentData);

  document.getElementById("content").innerHTML = html || "<div class='block'>No data</div>";
}

if (!item) {
  document.getElementById("error").innerText =
    "Missing item parameter\nExample: ?item=spring-001";
} else {
  const dataUrl = `${ITEMS_BASE}/${encodeURIComponent(item)}/data.json?v=${Date.now()}`;

  fetch(dataUrl, { cache: "no-store" })
    .then(res => {
      if (!res.ok) throw new Error("data.json not found");
      return res.json();
    })
    .then(data => {
      currentData = data;
      renderCard();
    })
    .catch(err => {
      document.getElementById("title").innerText = "Error";
      document.getElementById("error").innerText =
        "Loading error: " + err.message;
    });
}
</script>
</body>
</html>
