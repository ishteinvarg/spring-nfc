<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточка</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 15px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 26px;
      margin-bottom: 15px;
    }
    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
      display: none;
    }
    .lang-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .lang-btn {
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .lang-btn.active {
      background: #0f62fe;
      color: white;
      border-color: #0f62fe;
    }
    .block {
      margin-top: 15px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 10px;
    }
    .block b {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }
    ul {
      margin: 0;
      padding-left: 18px;
    }
    a {
      color: #0f62fe;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .error {
      color: red;
      font-weight: bold;
      white-space: pre-line;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="lang-switch">
      <button class="lang-btn active" data-lang="ru">RU</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="he">HE</button>
    </div>

    <h1 id="title">Загрузка...</h1>
    <img id="photo" alt="Изображение">
    <div id="content"></div>
    <div id="error" class="error"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const item = params.get("item");

const REPO_BASE = "/spring-nfc";
const CATALOG_BASE = REPO_BASE + "/catalog";
const ITEMS_BASE = CATALOG_BASE + "/items2";

let currentData = null;
let currentLang = "ru";

function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function getText(value, lang) {
  if (typeof value === "string") return value;
  if (value && typeof value === "object") {
    return value[lang] || value.ru || value.en || value.he || "";
  }
  return "";
}

function getArray(value, lang) {
  if (Array.isArray(value)) return value;
  if (value && typeof value === "object") {
    return value[lang] || value.ru || value.en || value.he || [];
  }
  return [];
}

function renderCard() {
  if (!currentData) return;

  document.getElementById("title").innerText =
    getText(currentData.title, currentLang) || "Карточка";

  if (currentData.image) {
    const img = document.getElementById("photo");
    img.src = `${ITEMS_BASE}/${encodeURIComponent(item)}/${encodeURIComponent(currentData.image)}?v=${Date.now()}`;
    img.style.display = "block";
  }

  let html = "";

  (currentData.sections || []).forEach(section => {
    if (section.hide === true) return;

    const title = getText(section.title, currentLang);
    const type = section.type;

    if (type === "text") {
      const content = getArray(section.content, currentLang);
      if (!content.length) return;
      html += `<div class="block"><b>${esc(title)}</b>${content.map(x => esc(x)).join("<br>")}</div>`;
    }

    if (type === "list") {
      const content = getArray(section.content, currentLang);
      if (!content.length) return;
      html += `<div class="block"><b>${esc(title)}</b><ul>`;
      content.forEach(i => {
        html += `<li>${esc(i)}</li>`;
      });
      html += `</ul></div>`;
    }
  });

  document.getElementById("content").innerHTML = html || "<div class='block'>Нет данных</div>";

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === currentLang);
  });
}

if (!item) {
  document.getElementById("error").innerText =
    "Нет параметра item\nПример: ?item=spring-001";
} else {
  const dataUrl = `${ITEMS_BASE}/${encodeURIComponent(item)}/data.json?v=${Date.now()}`;

  fetch(dataUrl, { cache: "no-store" })
    .then(res => {
      if (!res.ok) throw new Error("data.json не найден");
      return res.json();
    })
    .then(data => {
      currentData = data;
      renderCard();
    })
    .catch(err => {
      document.getElementById("title").innerText = "Ошибка";
      document.getElementById("error").innerText =
        "Ошибка загрузки: " + err.message;
    });
}

document.querySelectorAll(".lang-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    currentLang = btn.dataset.lang;
    renderCard();
  });
});
</script>
</body>
</html>
