<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Passport</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 15px;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 26px;
      margin-bottom: 15px;
    }
    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 15px;
      display: none;
    }
    .block {
      margin-top: 15px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 10px;
    }
    .block b {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
    }
    ul {
      margin: 0;
      padding-left: 18px;
    }
    .link-list {
      margin: 0;
      padding-left: 18px;
    }
    .link-list li {
      margin: 0 0 6px 0;
    }
    a {
      color: #0f62fe;
      text-decoration: none;
      word-break: break-word;
    }
    a:hover {
      text-decoration: underline;
    }
    .error {
      color: red;
      font-weight: bold;
      white-space: pre-line;
    }
    .passport-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .passport-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      line-height: 1.35;
    }
    .passport-label {
      min-width: 150px;
      font-weight: bold;
      color: #111827;
    }
    .passport-value {
      color: #374151;
      word-break: break-word;
    }
    .status-banner {
      display: none;
      margin-bottom: 15px;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: bold;
      border: 1px solid transparent;
      line-height: 1.35;
    }
    .status-active {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border-color: #a7f3d0;
    }
    .status-suspended {
      display: block;
      background: #fffbeb;
      color: #92400e;
      border-color: #fde68a;
    }
    .status-archived {
      display: block;
      background: #f3f4f6;
      color: #374151;
      border-color: #d1d5db;
    }
    .status-replaced {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border-color: #fecaca;
    }
    @media (min-width: 640px) {
      .passport-grid {
        grid-template-columns: 1fr 1fr;
        gap: 10px 18px;
      }
      .passport-row {
        display: block;
      }
      .passport-label {
        display: block;
        min-width: 0;
        margin-bottom: 2px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <div id="statusBanner" class="status-banner"></div>
    <h1 id="title">Loading...</h1>
    <img id="photo" alt="Image">
    <div id="content"></div>
    <div id="error" class="error"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const item = params.get("item");

const REPO_BASE = "/spring-nfc";
const CATALOG_BASE = REPO_BASE + "/catalog";
const ITEMS_BASE = CATALOG_BASE + "/items2";

let currentData = null;

function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function getText(value) {
  if (typeof value === "string") return value;
  if (value && typeof value === "object") {
    return value.ru || value.en || value.he || "";
  }
  return "";
}

function getArray(value) {
  if (Array.isArray(value)) return value;
  if (value && typeof value === "object") {
    return value.ru || value.en || value.he || [];
  }
  return [];
}

function normalizeHref(value) {
  const raw = String(value || "").trim();
  if (!raw) return "";
  if (raw.startsWith("http://") || raw.startsWith("https://") || raw.startsWith("mailto:") || raw.startsWith("tel:")) {
    return raw;
  }
  return "https://" + raw;
}

function getPassportMeta(data) {
  if (data && typeof data.passport_meta === "object" && data.passport_meta) {
    return data.passport_meta;
  }
  return data || {};
}

function getPublicCard(data) {
  if (data && typeof data.public_card === "object" && data.public_card) {
    return data.public_card;
  }
  return data || {};
}

function statusLabel(code) {
  const map = {
    active: "Active",
    suspended: "Suspended",
    archived: "Archived",
    replaced: "Replaced"
  };
  return map[(code || "").toLowerCase()] || "";
}

function statusMessage(code) {
  const map = {
    active: "This passport is active.",
    suspended: "This passport is currently suspended.",
    archived: "This passport is archived.",
    replaced: "This passport has been replaced."
  };
  return map[(code || "").toLowerCase()] || "";
}

function renderStatusBanner(meta) {
  const banner = document.getElementById("statusBanner");
  const code = String(meta.status || "").trim().toLowerCase();
  banner.className = "status-banner";
  banner.textContent = "";
  if (!code) {
    banner.style.display = "none";
    return;
  }
  const label = statusLabel(code);
  const message = statusMessage(code);
  if (!label) {
    banner.style.display = "none";
    return;
  }
  banner.classList.add("status-" + code);
  banner.textContent = message ? `${label} · ${message}` : label;
  banner.style.display = "block";
}

function renderTextBlock(title, content) {
  if (!content.length) return "";
  return `<div class="block"><b>${esc(title)}</b>${content.map(x => esc(x)).join("<br>")}</div>`;
}

function renderListBlock(title, content) {
  if (!content.length) return "";
  let html = `<div class="block"><b>${esc(title)}</b><ul>`;
  content.forEach(i => {
    html += `<li>${esc(i)}</li>`;
  });
  html += `</ul></div>`;
  return html;
}

function renderLinksBlock(title, content) {
  if (!content.length) return "";
  let html = `<div class="block"><b>${esc(title)}</b><ul class="link-list">`;
  content.forEach(i => {
    const label = esc(i.label || "");
    const text = esc(i.text || "");
    const href = normalizeHref(i.href || "");
    const line = label ? `${label}: ${text}` : text;
    if (href) {
      html += `<li><a href="${esc(href)}" target="_blank" rel="noopener noreferrer">${line}</a></li>`;
    } else {
      html += `<li>${line}</li>`;
    }
  });
  html += `</ul></div>`;
  return html;
}

function renderFilesBlock(title, content) {
  if (!content.length) return "";
  let html = `<div class="block"><b>${esc(title)}</b><ul class="link-list">`;
  content.forEach(file => {
    const name = esc(file.name || file.path || "File");
    const path = file.path ? `${ITEMS_BASE}/${encodeURIComponent(item)}/${encodeURIComponent(file.path)}` : "";
    if (path) {
      html += `<li><a href="${path}" target="_blank" rel="noopener noreferrer">${name}</a></li>`;
    } else {
      html += `<li>${name}</li>`;
    }
  });
  html += `</ul></div>`;
  return html;
}

function hasValue(v) {
  return !(v === undefined || v === null || String(v).trim() === "");
}

function passportEntries(meta, publicCard, fallbackData) {
  return [
    ["Internal ID", meta.internal_id],
    ["Passport Type", meta.passport_type],
    ["Status", meta.status],
    ["Version", meta.version],
    ["Product Name", meta.product_name || publicCard.title || fallbackData.title],
    ["Batch ID", meta.batch_id],
    ["Serial ID", meta.serial_id],
    ["Verification Code", meta.verification_code],
    ["Created At", meta.created_at],
    ["Updated At", meta.updated_at]
  ].filter(([_, value]) => hasValue(value));
}

function renderPassportBlock(meta, publicCard, fallbackData) {
  const entries = passportEntries(meta, publicCard, fallbackData);
  if (!entries.length) return "";
  let html = `<div class="block"><b>Product Passport</b><div class="passport-grid">`;
  entries.forEach(([label, value]) => {
    html += `<div class="passport-row"><span class="passport-label">${esc(label)}</span><span class="passport-value">${esc(value)}</span></div>`;
  });
  html += `</div></div>`;
  return html;
}

function renderCard() {
  if (!currentData) return;

  const meta = getPassportMeta(currentData);
  const publicCard = getPublicCard(currentData);

  document.getElementById("title").innerText =
    getText(meta.product_name) || getText(publicCard.title) || getText(currentData.title) || "Product Passport";

  renderStatusBanner(meta);

  const img = document.getElementById("photo");
  const imageName = publicCard.image || currentData.image;
  if (imageName) {
    img.src = `${ITEMS_BASE}/${encodeURIComponent(item)}/${encodeURIComponent(imageName)}?v=${Date.now()}`;
    img.style.display = "block";
  } else {
    img.removeAttribute("src");
    img.style.display = "none";
  }

  let html = "";
  html += renderPassportBlock(meta, publicCard, currentData);

  (publicCard.sections || currentData.sections || []).forEach(section => {
    if (section.hide === true) return;

    let title = getText(section.title);
    const type = section.type;
    const content = getArray(section.content);

    if (type === "text") {
      title = "Description";
      html += renderTextBlock(title, content);
    } else if (type === "list") {
      html += renderListBlock(title || "List", content);
    } else if (type === "links") {
      title = "Contacts";
      const normalizedContent = content.map(i => ({
        ...i,
        label:
          i.kind === "phone" ? "Phone" :
          i.kind === "email" ? "Email" :
          i.kind === "whatsapp" ? "WhatsApp" :
          i.kind === "website" ? "Website" :
          (i.label === "Телефон" ? "Phone" :
           i.label === "Сайт" ? "Website" :
           i.label || "")
      }));
      html += renderLinksBlock(title, normalizedContent);
    } else if (type === "files") {
      title = "Files";
      html += renderFilesBlock(title, content);
    }
  });

  document.getElementById("content").innerHTML = html || "<div class='block'>No data</div>";
}

if (!item) {
  document.getElementById("error").innerText =
    "Missing item parameter
Example: ?item=spring-001";
} else {
  const dataUrl = `${ITEMS_BASE}/${encodeURIComponent(item)}/data.json?v=${Date.now()}`;

  fetch(dataUrl, { cache: "no-store" })
    .then(res => {
      if (!res.ok) throw new Error("data.json not found");
      return res.json();
    })
    .then(data => {
      currentData = data;
      renderCard();
    })
    .catch(err => {
      document.getElementById("title").innerText = "Error";
      document.getElementById("error").innerText =
        "Loading error: " + err.message;
    });
}
</script>
</body>
</html>
