<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточка</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #1f2937;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .title {
      margin: 0 0 14px;
      font-size: 28px;
      line-height: 1.2;
    }

    .photo {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      border-radius: 14px;
      display: none;
      margin-bottom: 18px;
      background: #e5e7eb;
    }

    .section {
      margin-top: 16px;
      padding: 14px;
      background: #f9fafb;
      border-radius: 12px;
      border: 1px solid #eef0f3;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .section-text {
      line-height: 1.6;
      white-space: pre-line;
    }

    .section-list {
      margin: 0;
      padding-left: 20px;
      line-height: 1.6;
    }

    .section-list li {
      margin-bottom: 6px;
    }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-link {
      display: inline-block;
      text-decoration: none;
      color: #0f62fe;
      word-break: break-word;
    }

    .file-link:hover {
      text-decoration: underline;
    }

    .muted {
      color: #6b7280;
    }

    .error {
      color: #b91c1c;
      font-weight: 700;
      white-space: pre-line;
    }

    .top-note {
      margin-top: 8px;
      font-size: 13px;
      color: #6b7280;
    }

    @media (max-width: 640px) {
      .page { padding: 10px; }
      .card { padding: 14px; border-radius: 12px; }
      .title { font-size: 24px; }
      .section-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card" id="card">
      <h1 class="title" id="title">Загрузка...</h1>
      <img id="photo" class="photo" alt="Изображение">
      <div id="content"></div>
      <div class="top-note" id="note"></div>
      <div id="error" class="error" style="display:none;"></div>
    </div>
  </div>

  <script>
    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function isEmptyValue(value) {
      if (value === null || value === undefined) return true;
      if (typeof value === "string" && value.trim() === "") return true;
      if (Array.isArray(value) && value.length === 0) return true;
      return false;
    }

    function renderSection(section, item) {
      if (!section || isEmptyValue(section.content)) return "";

      const title = escapeHtml(section.title || "");
      let body = "";

      if (section.type === "text") {
        const lines = Array.isArray(section.content) ? section.content : [section.content];
        const safeLines = lines
          .filter(line => !isEmptyValue(line))
          .map(line => escapeHtml(String(line)));
        if (!safeLines.length) return "";
        body = `<div class="section-text">${safeLines.join("<br>")}</div>`;
      }

      else if (section.type === "list") {
        const items = Array.isArray(section.content) ? section.content : [section.content];
        const safeItems = items
          .filter(line => !isEmptyValue(line))
          .map(line => `<li>${escapeHtml(String(line))}</li>`);
        if (!safeItems.length) return "";
        body = `<ul class="section-list">${safeItems.join("")}</ul>`;
      }

      else if (section.type === "files") {
        const files = Array.isArray(section.content) ? section.content : [];
        const links = files
          .filter(file => file && !isEmptyValue(file.path))
          .map(file => {
            const name = escapeHtml(file.name || file.path);
            const path = `items/${encodeURIComponent(item)}/${file.path}`;
            return `<a class="file-link" href="${path}" target="_blank" rel="noopener">${name}</a>`;
          });
        if (!links.length) return "";
        body = `<div class="file-list">${links.join("")}</div>`;
      }

      else if (section.type === "html") {
        if (typeof section.content !== "string" || section.content.trim() === "") return "";
        body = `<div class="section-text">${section.content}</div>`;
      }

      else {
        return "";
      }

      return `
        <section class="section">
          ${title ? `<div class="section-title">${title}</div>` : ""}
          ${body}
        </section>
      `;
    }

    async function loadCard() {
      const item = getQueryParam("item");
      const titleEl = document.getElementById("title");
      const photoEl = document.getElementById("photo");
      const contentEl = document.getElementById("content");
      const errorEl = document.getElementById("error");
      const noteEl = document.getElementById("note");

      if (!item) {
        titleEl.textContent = "Карточка";
        errorEl.style.display = "block";
        errorEl.textContent = "Не указан параметр item в ссылке.\nПример: ?item=product-001";
        return;
      }

      try {
        const response = await fetch(`items/${encodeURIComponent(item)}/data.json`, {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("data.json not found");
        }

        const data = await response.json();

        titleEl.textContent = data.title || "Карточка";

        if (data.image && String(data.image).trim() !== "") {
          photoEl.src = `items/${encodeURIComponent(item)}/${data.image}`;
          photoEl.style.display = "block";
        }

        const sections = Array.isArray(data.sections) ? data.sections : [];
        const rendered = sections.map(section => renderSection(section, item)).filter(Boolean);

        if (rendered.length) {
          contentEl.innerHTML = rendered.join("");
        } else {
          contentEl.innerHTML = `
            <section class="section">
              <div class="section-title">Нет данных</div>
              <div class="section-text muted">В карточке нет заполненных блоков.</div>
            </section>
          `;
        }

        if (data.note && String(data.note).trim() !== "") {
          noteEl.textContent = data.note;
        }
      } catch (error) {
        titleEl.textContent = "Ошибка";
        errorEl.style.display = "block";
        errorEl.textContent = "Не удалось загрузить карточку.\nПроверь путь items/ИМЯ/data.json";
      }
    }

    loadCard();
  </script>
</body>
</html>
